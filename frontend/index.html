<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gobang-python</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-api-base="http://127.0.0.1:8000">
    <main id="app" class="app-shell" aria-label="gobang-python">
      <section class="play-surface" aria-label="棋局">
        <header class="topbar">
          <div>
            <p class="eyebrow">gobang-python</p>
            <h1>五子棋控制台</h1>
          </div>
          <div id="status" class="status-pill" role="status">未连接</div>
        </header>

        <div class="board-zone">
          <div id="board" class="board" role="grid" aria-label="15 x 15 五子棋棋盘"></div>
        </div>
      </section>

      <aside class="side-panel" aria-label="棋局控制">
        <div class="panel-section">
          <p class="section-label">Controls</p>
          <div class="button-row">
            <button id="start-button" type="button">开始</button>
            <button id="undo-button" type="button">悔棋</button>
            <button id="end-button" type="button">结束</button>
          </div>
        </div>

        <div class="panel-section stats-grid" aria-label="棋局状态">
          <div>
            <span>棋盘</span>
            <strong>15 x 15</strong>
          </div>
          <div>
            <span>深度</span>
            <strong>4</strong>
          </div>
          <div>
            <span>当前</span>
            <strong>黑方</strong>
          </div>
          <div>
            <span>胜者</span>
            <strong>未定</strong>
          </div>
        </div>

        <div class="panel-section">
          <p class="section-label">Moves</p>
          <ol id="move-list" class="move-list" aria-label="落子记录"></ol>
        </div>
      </aside>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
