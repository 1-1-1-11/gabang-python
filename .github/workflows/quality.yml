name: Quality Gates

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Pytest, Build, and E2E
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install -r backend\requirements.lock.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run backend tests
        run: python -m pytest backend\tests -q

      - name: Build frontend
        run: npm run build

      - name: Run browser acceptance tests
        run: npm run test:e2e

      - name: Check whitespace in latest commit
        run: git diff-tree --check --no-commit-id --root -r HEAD
